name = "primera-meetup-jschile"
main = "src/index.ts"
compatibility_date = "2024-03-03"

# Servir la SPA de React como static assets
[assets]
directory = "./app/dist"

# Base de datos D1 para las frases
# Obtener con: npx wrangler d1 create jschile-phrases
[[d1_databases]]
binding = "jschile_phrases"
database_name = "jschile-phrases"
database_id = "<PEGAR_ID_AQUI>"

# KV para contadores de rate limiting
# Obtener con: npx wrangler kv namespace create RATE_LIMIT_KV
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "<PEGAR_ID_AQUI>"
